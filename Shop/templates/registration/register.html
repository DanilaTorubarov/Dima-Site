{% extends "main/base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>Регистрация</h1>

        <form method="post">
            {% csrf_token %}
            <table class="form-table">
                {{ form.as_table }}
            </table>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem;">
                Создать аккаунт
            </button>
        </form>

        <p class="auth-link">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}

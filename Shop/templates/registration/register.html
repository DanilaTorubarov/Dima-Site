{% extends "main/base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 0 auto;">
    <h1 style="margin-top: 0; margin-bottom: 1rem;">Регистрация</h1>

    <form method="post">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <button type="submit" class="btn btn-primary" style="margin-top: 0.75rem;">Создать аккаунт</button>
    </form>

    <p style="font-size: 0.9rem; color: #6b7280; margin-top: 1rem;">
        Уже есть аккаунт?
        <a href="{% url 'login' %}">Войти</a>
    </p>
</div>
{% endblock %}

{% extends "main/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>

{% if form.errors %}
    <p style="color: #b91c1c;">Please correct the errors below.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <button type="submit" class="btn btn-primary">Login</button>
    <input type="hidden" name="next" value="{{ next }}">
</form>

{% endblock %}

{% extends "main/base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>Войти</h1>

        {% if form.errors %}
            <div class="auth-error">Неверный логин или пароль. Попробуйте ещё раз.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <table class="form-table">
                {{ form.as_table }}
            </table>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem;">
                Войти
            </button>
        </form>

        <p class="auth-link">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}

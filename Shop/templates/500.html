<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ошибка сервера — Hydro-Point</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f5f8;
            color: #1c1c1c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .code {
            font-size: 7rem;
            font-weight: 800;
            color: #0176b7;
            line-height: 1;
            opacity: 0.8;
            margin-bottom: 0.4rem;
        }
        h1 { font-size: 1.55rem; font-weight: 700; margin-bottom: 0.6rem; }
        p { font-size: 0.95rem; color: #6b7280; margin-bottom: 2rem; max-width: 420px; line-height: 1.6; }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 1.4rem;
            border-radius: 999px;
            background: #0176b7;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.18s;
        }
        a:hover { background: #015a8e; }
        .brand { margin-top: 3rem; font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="code">500</div>
    <h1>Ошибка на сервере</h1>
    <p>
        Что-то пошло не так. Мы уже знаем об этой проблеме и работаем над её устранением.
        Попробуйте зайти чуть позже.
    </p>
    <a href="/">На главную</a>
    <p class="brand">Hydro-Point</p>
</body>
</html>
